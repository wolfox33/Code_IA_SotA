name: Publish CLI Package

on:
  push:
    branches:
      - main
    paths:
      - "code-ia-sota-cli/package.json"
      - "code-ia-sota-cli/package-lock.json"
      - "code-ia-sota-cli/bin/**"
      - "code-ia-sota-cli/README.md"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./code-ia-sota-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Check published version
        id: version_check
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$PUBLISHED_VERSION" = "$PACKAGE_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION is already published."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Publishing version $PACKAGE_VERSION."
          fi

      - name: Publish package
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
