name: Validate Harness

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./code-ia-sota-cli
        run: npm ci

      - name: Run harness validation
        working-directory: ./code-ia-sota-cli
        run: npm run validate:harness
        env:
          HARNESS_DENSITY_THRESHOLD: "30"
          HARNESS_FAIL_ON_WARNINGS: "false"

      - name: Create density snapshot
        working-directory: ./code-ia-sota-cli
        run: npm run density:snapshot

      - name: Commit density history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .agents/data/density-history.json
          git diff --staged --quiet || git commit -m "chore: update density snapshot [skip ci]"
          git push
